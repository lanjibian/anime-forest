<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 注册 - 二次元の森</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h2>🌸 创建账号</h2>
        <p class="sub">加入二次元の森，探索精彩世界</p>

        <form id="registerForm">
            <div class="form-group">
                <label>😊 昵称</label>
                <input type="text" class="form-input" id="regNickname" placeholder="你的昵称">
            </div>
            <div class="form-group">
                <label>📧 邮箱</label>
                <input type="email" class="form-input" id="regEmail" placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>🔒 密码</label>
                <input type="password" class="form-input" id="regPassword" placeholder="至少6位密码" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>🔒 确认密码</label>
                <input type="password" class="form-input" id="regConfirmPassword" placeholder="再次输入密码" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">
                🎀 注册
            </button>
        </form>

        <p class="switch-link">已有账号？<a href="login.html">立即登录 →</a></p>
        <p style="text-align:center;margin-top:8px">
            <a href="../index.html" style="color:var(--ink-400);font-size:0.82em">← 返回首页</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/app.js"></script>
</body>
</html>
