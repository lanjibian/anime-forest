<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ 管理面板 - 二次元の森</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&family=Zen+Maru+Gothic:wght@400;500;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar"></nav>

    <div class="admin-layout">
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="menu-item active" data-panel="works">📚 作品管理</div>
            <div class="menu-item" data-panel="addWork">➕ 上传作品</div>
            <div class="menu-item" data-panel="users">👥 用户管理</div>
        </aside>

        <main class="admin-content">
            <div id="panel-works">
                <h3>📚 所有作品</h3>
                <div class="search-bar" style="margin:0 0 16px 0">
                    <input type="text" class="form-input" id="adminSearch" placeholder="🔍 搜索作品...">
                </div>
                <div id="adminWorksList"></div>
            </div>

            <div id="panel-addWork" style="display:none">
                <div class="card">
                    <h3 class="card-title">➕ 上传新作品</h3>
                    <form id="addWorkForm">
                        <div class="form-group">
                            <label>📂 作品类型</label>
                            <select class="form-input" id="workType" required>
                                <option value="">请选择类型</option>
                                <option value="novel">📖 小说</option>
                                <option value="anime">📺 动画</option>
                                <option value="manga">📚 漫画</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>📝 作品名称</label>
                            <input type="text" class="form-input" id="workTitle" placeholder="给作品起个名字吧" required>
                        </div>
                        <div class="form-group">
                            <label>✍️ 作者</label>
                            <input type="text" class="form-input" id="workAuthor" placeholder="作者名" required>
                        </div>
                        <div class="form-group">
                            <label>🎨 封面 Emoji</label>
                            <input type="text" class="form-input" id="workCover" placeholder="例如: 📖🌸✨🔮⚔️🐱" maxlength="2">
                        </div>
                        <div class="form-group">
                            <label>🏷️ 标签（用逗号分隔）</label>
                            <input type="text" class="form-input" id="workTags" placeholder="例如: 校园,恋爱,治愈" required>
                        </div>
                        <div class="form-group">
                            <label>📄 简介</label>
                            <textarea class="form-input" id="workDesc" placeholder="写一段吸引人的简介..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">✅ 创建作品</button>
                    </form>
                </div>

                <div class="card">
                    <h3 class="card-title">📑 章节管理</h3>
                    <div class="form-group">
                        <label>选择作品</label>
                        <select class="form-input" id="chapterWorkSelect" onchange="loadChaptersForAdmin()">
                            <option value="">请选择作品</option>
                        </select>
                    </div>
                    <div id="chapterListAdmin" style="margin:16px 0"></div>

                    <form id="addChapterForm">
                        <input type="hidden" id="chapterWorkId">
                        <div class="form-group">
                            <label>📝 章节标题</label>
                            <input type="text" class="form-input" id="chapterTitle" placeholder="例如: 第一章：开端" required>
                        </div>
                        <div class="form-group">
                            <label>📄 章节内容</label>
                            <textarea class="form-input" id="chapterContent" placeholder="章节正文内容..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">➕ 添加章节</button>
                    </form>
                </div>
            </div>

            <div id="panel-users" style="display:none">
                <h3>👥 用户列表</h3>
                <div id="adminUsersList"></div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h3>✏️ 编辑作品</h3>
            <form id="editWorkForm">
                <input type="hidden" id="editWorkId">
                <div class="form-group">
                    <label>📝 作品名称</label>
                    <input type="text" class="form-input" id="editWorkTitle" required>
                </div>
                <div class="form-group">
                    <label>✍️ 作者</label>
                    <input type="text" class="form-input" id="editWorkAuthor" required>
                </div>
                <div class="form-group">
                    <label>🏷️ 标签（逗号分隔）</label>
                    <input type="text" class="form-input" id="editWorkTags" required>
                </div>
                <div class="form-group">
                    <label>📄 简介</label>
                    <textarea class="form-input" id="editWorkDesc" required></textarea>
                </div>
                <div style="display:flex;gap:10px">
                    <button type="submit" class="btn btn-primary">💾 保存</button>
                    <button type="button" class="btn btn-outline" onclick="closeEditModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/app.js"></script>
</body>
</html>
