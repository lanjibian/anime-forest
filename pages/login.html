<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 登录 - 二次元の森</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&family=Zen+Maru+Gothic:wght@400;500;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h2>🌸 欢迎回来</h2>
        <p class="sub">登录到二次元の森</p>

        <form id="loginForm">
            <div class="form-group">
                <label>📧 邮箱</label>
                <input type="email" class="form-input" id="loginEmail" placeholder="请输入邮箱" autocomplete="email">
            </div>
            <div class="form-group">
                <label>🔒 密码</label>
                <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">
                ✨ 登录
            </button>
        </form>

        <p class="switch-link">还没有账号？<a href="register.html">立即注册 →</a></p>
        <p style="text-align:center;margin-top:8px">
            <a href="../index.html" style="color:var(--ink-400);font-size:0.82em">← 返回首页</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/app.js"></script>
</body>
</html>
