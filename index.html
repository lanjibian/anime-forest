<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="二次元の森 —— 在樱花飘落的世界里，发现你喜欢的小说、动画与漫画作品">
    <title>🌸 二次元の森 - 首页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&family=Zen+Maru+Gothic:wght@400;500;700&family=ZCOOL+KuaiLe&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar"></nav>

    <div class="container">
        <section class="hero">
            <h1>🌸 二次元の森へようこそ</h1>
            <p class="subtitle">在樱花飘落的世界里，发现你喜欢的作品 ✨</p>
        </section>

        <div class="search-bar">
            <input type="text" class="form-input" id="searchInput" placeholder="🔍 搜索作品名或作者...">
            <button class="btn btn-primary" id="searchBtn">搜索</button>
        </div>

        <div class="categories">
            <button class="cat-btn active" data-type="">🌟 全部</button>
            <button class="cat-btn" data-type="novel">📖 小说</button>
            <button class="cat-btn" data-type="anime">📺 动画</button>
            <button class="cat-btn" data-type="manga">📚 漫画</button>
        </div>

        <div id="worksGrid"></div>
    </div>

    <footer class="footer">
        <p>🌸 二次元の森 © 2026 — 为每一个热爱二次元的心</p>
        <p style="margin-top:4px;font-size:0.8em">Powered by Supabase</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
</body>
</html>
